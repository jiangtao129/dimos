name: verify

# Single CI gate for the jiangtao129/dimos fork. Mirrors `scripts/verify.sh`
# 1:1 so "passed locally" implies "passes in CI" (modulo system deps that
# only the GitHub Actions ubuntu-latest image carries).
#
# All other workflows in this directory (ci.yml, macos.yml, code-cleanup.yml,
# docker-build.yml, stale.yml) gate themselves to the upstream repository
# (`if: github.repository == 'dimensionalOS/dimos'`) and so do not run on
# this fork. The branch protection rule should require **only** this
# workflow's `verify` job.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**.md'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'

permissions:
  contents: read

jobs:
  verify:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # LFS objects are deliberately not on jiangtao129/dimos (Q4=B in
          # docs/dimos_pipeline_setup_for_agent.md). Tests that need them
          # are soft-skipped by the repo-root conftest.py, gated on
          # DIMOS_SKIP_MISSING_LFS=1 (set automatically by verify.sh).
          lfs: false

      - name: Install system dependencies (compile + runtime)
        # Subset of the upstream `docker/python/Dockerfile` apt list, narrowed to
        # what `uv sync --all-extras --no-extra dds --frozen` needs to build and
        # what the test suite needs at runtime:
        #   - git-lfs           : git lfs ls-files / pull (pointer-only)
        #   - portaudio19-dev   : pyaudio (transitive via dimos[unitree] ->
        #                         unitree-webrtc-connect-leshy -> pyaudio)
        #   - libturbojpeg0-dev : PyTurboJPEG (used in dimos.msgs.sensor_msgs.Image)
        # qt/mesa/xcb are intentionally NOT installed; verify.sh does not run
        # any GUI test path.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git-lfs \
            portaudio19-dev \
            libturbojpeg0-dev
          git lfs install --skip-smudge

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Run unified verify
        run: bash ./scripts/verify.sh
